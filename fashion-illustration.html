<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fashion Illustrations | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#050505; color:#fff; font-family:'Poppins', sans-serif; overflow-x:hidden; }

    /* Hero Section */
    .hero { padding: 100px 8%; text-align: center; }
    .hero h1 { font-size: 4rem; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px; }
    .hero p { color: #888; font-size: 1.2rem; }

    /* Illustration Gallery */
    .gallery { padding: 50px 8%; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }

    .art-card { 
      background: #111; border-radius: 20px; overflow: hidden; border: 1px solid #222;
      transition: 0.5s; cursor: pointer; position: relative;
    }
    
    .art-card img { width: 100%; height: 500px; object-fit: cover; transition: 0.5s; filter: grayscale(20%); }
    .art-card:hover img { filter: grayscale(0%); transform: scale(1.05); }

    .art-info { padding: 20px; text-align: center; }
    .art-info h3 { font-size: 1.2rem; margin-bottom: 5px; }

    /* Fullscreen Popup */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.4s; z-index: 1000; }
    .modal.active { opacity: 1; visibility: visible; }
    .modal img { max-width: 90%; max-height: 80vh; border-radius: 10px; box-shadow: 0 0 30px rgba(255,255,255,0.1); }
    .close-btn { position: absolute; top: 40px; right: 40px; font-size: 3rem; cursor: pointer; }
  </style>
</head>
<body>

  <div class="hero">
    <h1 data-aos="fade-down">Fashion Illustrations</h1>
    <p>Hand-crafted concepts, digital strokes, and timeless elegance.</p>
  </div>

  <section class="gallery">
    <!-- Repeat this block for each illustration -->
    <div class="art-card" data-tilt data-aos="zoom-in">
      <img src="fashion/1.png" alt="Illustration">
      <div class="art-info">
    
      </div>
    </div>

    <div class="art-card" data-tilt data-aos="zoom-in" data-aos-delay="100">
      <img src="fashion/2.png" alt="Illustration">
      <div class="art-info">
        <h3>Runway Dream</h3>
      </div>
    </div>
    <div class="art-card" data-tilt data-aos="zoom-in">
      <img src="fashion/4.png" alt="Illustration">
      <div class="art-info">
    
      </div>
    </div>
    <div class="art-card" data-tilt data-aos="zoom-in">
      <img src="fashion/5.png" alt="Illustration">
      <div class="art-info">
    
      </div>
    </div>

    <div class="art-card" data-tilt data-aos="zoom-in">
      <img src="fashion/6.png" alt="Illustration">
      <div class="art-info">
    
      </div>
    </div>

    <div class="art-card" data-tilt data-aos="zoom-in">
      <img src="fashion/7.png" alt="Illustration">
      <div class="art-info">
    
      </div>
    </div>

    <div class="art-card" data-tilt data-aos="zoom-in">
      <img src="fashion/8.png" alt="Illustration">
      <div class="art-info">
    
      </div>
    </div>

    <div class="art-card" data-tilt data-aos="zoom-in">
      <img src="fashion/9.png" alt="Illustration">
      <div class="art-info">
    
      </div>
    </div>
    <div class="art-card" data-tilt data-aos="zoom-in" data-aos-delay="200">
      <img src="fashion/3.png" alt="Illustration">
      <div class="art-info">
        <h3>Avant-Garde Sketch</h3>
      </div>
    </div>
  </section>

  <!-- Modal -->
  <div class="modal">
    <span class="close-btn">&times;</span>
    <img src="" alt="Full View">
  </div>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 1000, once: true });
    
    // Tilt Effect
    VanillaTilt.init(document.querySelectorAll(".art-card"), { max: 10, speed: 400, glare: true, "max-glare": 0.3 });

    // Modal Logic
    const modal = document.querySelector(".modal");
    const modalImg = modal.querySelector("img");
    document.querySelectorAll(".art-card img").forEach(img => {
      img.onclick = () => { modal.classList.add("active"); modalImg.src = img.src; };
    });
    document.querySelector(".close-btn").onclick = () => modal.classList.remove("active");
    modal.onclick = (e) => { if(e.target !== modalImg) modal.classList.remove("active"); };
  </script>
</body>
</html>
