<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Dhanunjai Reddy</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <!-- AOS Animation -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
    body { background: #050505; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #ff1e1e; border-radius: 10px; }

    /* Container */
    .contact-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 8%;
    }

    .contact-card {
      width: 100%;
      max-width: 600px;
      background: #111;
      padding: 50px;
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
      position: relative;
    }

    h1 { font-size: 3rem; margin-bottom: 20px; font-family: 'Orbitron', sans-serif; }
    h1 span { color: #ff1e1e; }
    p { color: #cfcfcf; margin-bottom: 40px; line-height: 1.8; }

    /* Form */
    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-size: 14px; }
    input, textarea {
      width: 100%;
      padding: 15px;
      background: #050505;
      border: 1px solid #333;
      border-radius: 15px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      transition: 0.3s;
    }
    input:focus, textarea:focus { border-color: #ff1e1e; outline: none; }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: #ff1e1e;
      border: none;
      border-radius: 15px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.4s;
    }
    .submit-btn:hover { background: #fff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.2); }

    .back-btn { display: inline-block; margin-top: 30px; color: #777; text-decoration: none; font-size: 14px; }
    .back-btn:hover { color: #ff1e1e; }
  </style>
</head>
<body>

  <section class="contact-page">
    <div class="contact-card" data-aos="zoom-in">
      <h1>Let's <span>Connect</span></h1>
      <p>Have a project idea or a partnership opportunity? Fill out the form below.</p>

      <form action="https://formsubmit.co/your-email@example.com" method="POST">
        <div class="form-group">
          <label>Name</label>
          <input type="text" name="name" placeholder="Your Name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="Your Email" required>
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea name="message" rows="5" placeholder="Tell me about your project..." required></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Message</button>
      </form>

      <a href="index.html" class="back-btn">← Back to Portfolio</a>
    </div>
  </section>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
